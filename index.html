<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Playables</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0f1115;
      color:#e8e8e8;
      margin:0;
      padding:28px;
    }
    h1{margin:0 0 12px 0; font-size:22px;}

    .card{
      background:#151a22;
      border:1px solid #232a36;
      border-radius:10px;
      padding:14px;
      margin:12px 0;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      background:#1c2230;
      color:#fff;
      border:1px solid #2a3345;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{background:#242c3c;}

    input{
      background:#0f1115;
      color:#fff;
      border:1px solid #2a3345;
      padding:8px 12px;
      border-radius:8px;
      min-width:240px;
    }

    details{margin-left:10px;}
    summary{
      cursor:pointer;
      padding:6px 8px;
      border-radius:8px;
      font-weight:700;
      user-select:none;
    }
    summary:hover{background:#1c2230;}

    .file{
      margin:6px 0 6px 18px;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .file-name{
      display:inline-block;
      margin-right:10px;
      font-weight:bold;
      max-width:200px;
      text-overflow:ellipsis;
      white-space:nowrap;
      overflow:hidden;
    }

    .run{
      background:#2ecc71;
      border:none;
      padding:10px 16px;
      border-radius:8px;
      cursor:pointer;
      font-weight:800;
      color:#08110a;
    }
    .run:hover{background:#28b463;}

    .download{
      background:#3498db;
      border:none;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      font-weight:800;
      color:#07131d;
    }
    .download:hover{background:#2f86c1;}

    .share{
      background:#8e44ad;
      border:none;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      font-weight:800;
      color:#f0e8f5;
    }
    .share:hover{background:#7d3c98;}
    .share.copied{background:#27ae60;color:#fff;}

    .muted{opacity:.75;}
    .error{color:#ffb4b4;}

    /* Share landing page */
    .landing-inner{
      max-width:420px;
      margin:80px auto 0;
      text-align:center;
    }
    .landing-inner h2{
      font-size:20px;
      margin:0 0 6px 0;
      word-break:break-all;
    }
    .landing-inner .sub{
      color:#7a8a9a;
      font-size:13px;
      margin-bottom:32px;
    }
    .landing-btns{
      display:flex;
      gap:16px;
      justify-content:center;
    }
    .landing-btns .run,
    .landing-btns .download{
      font-size:16px;
      padding:14px 28px;
    }
    .back-link{
      display:inline-block;
      margin-top:32px;
      color:#5a7fa8;
      text-decoration:none;
      font-size:13px;
    }
    .back-link:hover{color:#7fafd8;}
  </style>
</head>

<body>
  <!-- Normal index view -->
  <div id="index-view">
    <h1>🎮 Playables</h1>

    <div class="card">
      <div class="controls">
        <button id="expandAll" class="btn">Expand all</button>
        <button id="collapseAll" class="btn">Collapse all</button>
        <input id="search" placeholder="Search folders / files…" />
        <span id="status" class="muted"></span>
      </div>
    </div>

    <div id="tree" class="card">Loading…</div>
  </div>

  <!-- Share landing page (hidden until ?file= param detected) -->
  <div id="landing" style="display:none">
    <div class="landing-inner">
      <h2 id="landing-name"></h2>
      <div class="sub">Playable Ad</div>
      <div class="landing-btns">
        <button id="landing-download" class="download">⬇ Download</button>
        <button id="landing-run" class="run">▶ Run</button>
      </div>
      <a id="landing-back" href="" class="back-link">← All playables</a>
    </div>
  </div>

<script>
(() => {
  // Base URL of the directory containing index.html (works on any host/path)
  const BASE = location.href.split("?")[0].replace(/[^/]*$/, "");

  function makeShareURL(filePath) {
    return BASE + "index.html?file=" + encodeURIComponent(filePath);
  }

  // ── Share landing page ───────────────────────────────────────────────────
  function showLanding(filePath) {
    document.getElementById("index-view").style.display = "none";
    document.getElementById("landing").style.display = "block";

    const fileUrl = BASE + filePath;
    const filename = filePath.split("/").pop() || "playable.html";

    document.title = filename;
    document.getElementById("landing-name").textContent = filename;

    document.getElementById("landing-download").addEventListener("click", () => {
      const a = document.createElement("a");
      a.href = fileUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    document.getElementById("landing-run").addEventListener("click", () => {
      window.open(fileUrl, "_blank", "noopener");
    });

    document.getElementById("landing-back").href = BASE + "index.html";
  }

  // ── Tree rendering ───────────────────────────────────────────────────────
  function buildNestedTree(paths) {
    const root = { type: "dir", children: new Map() };
    for (const p of paths) {
      const segs = p.split("/").filter(Boolean);
      let cur = root;
      for (let i = 0; i < segs.length; i++) {
        const name = segs[i];
        const last = i === segs.length - 1;
        if (last) {
          cur.children.set(name, { type: "file", path: p });
        } else {
          if (!cur.children.has(name))
            cur.children.set(name, { type: "dir", children: new Map() });
          cur = cur.children.get(name);
        }
      }
    }
    return root;
  }

  function sortChildren(map) {
    return [...map.entries()].sort((a, b) => {
      if (a[1].type !== b[1].type) return a[1].type === "dir" ? -1 : 1;
      return a[0].localeCompare(b[0], undefined, { sensitivity: "base" });
    });
  }

  function renderNode(node, name, depth) {
    if (node.type === "file") {
      const fileUrl = BASE + node.path;
      const filename = node.path.split("/").pop() || "playable.html";

      const fileDiv = document.createElement("div");
      fileDiv.className = "file";
      fileDiv.dataset.path = node.path.toLowerCase();

      const fileNameDiv = document.createElement("div");
      fileNameDiv.className = "file-name";
      fileNameDiv.title = filename;
      fileNameDiv.textContent = filename;

      const downloadBtn = document.createElement("button");
      downloadBtn.className = "download";
      downloadBtn.textContent = "⬇ Download";
      downloadBtn.addEventListener("click", () => {
        const a = document.createElement("a");
        a.href = fileUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      });

      const shareBtn = document.createElement("button");
      shareBtn.className = "share";
      shareBtn.textContent = "🔗 Copy Link";
      shareBtn.addEventListener("click", () => {
        const shareUrl = makeShareURL(node.path);
        navigator.clipboard.writeText(shareUrl).then(() => {
          shareBtn.textContent = "✓ Copied!";
          shareBtn.classList.add("copied");
          setTimeout(() => {
            shareBtn.textContent = "🔗 Copy Link";
            shareBtn.classList.remove("copied");
          }, 2000);
        }).catch(() => {
          prompt("Copy this link:", shareUrl);
        });
      });

      const runBtn = document.createElement("button");
      runBtn.className = "run";
      runBtn.textContent = "▶ Run";
      runBtn.addEventListener("click", () => {
        window.open(fileUrl, "_blank", "noopener");
      });

      fileDiv.appendChild(fileNameDiv);
      fileDiv.appendChild(downloadBtn);
      fileDiv.appendChild(shareBtn);
      fileDiv.appendChild(runBtn);
      return fileDiv;
    }

    const details = document.createElement("details");
    details.dataset.folder = (name || "/").toLowerCase();
    if (depth === 0) details.open = true;

    const summary = document.createElement("summary");
    summary.textContent = name || "All Playables";
    details.appendChild(summary);

    const wrap = document.createElement("div");
    wrap.style.marginLeft = "10px";
    for (const [childName, childNode] of sortChildren(node.children))
      wrap.appendChild(renderNode(childNode, childName, depth + 1));
    details.appendChild(wrap);
    return details;
  }

  function setAllDetails(open) {
    document.querySelectorAll("#tree details").forEach(d => d.open = open);
  }

  function applySearch(q) {
    q = q.trim().toLowerCase();
    const allFiles = [...document.querySelectorAll("#tree .file")];
    const allFolders = [...document.querySelectorAll("#tree details")];

    if (!q) {
      allFiles.forEach(el => el.style.display = "");
      allFolders.forEach(el => el.style.display = "");
      return;
    }

    allFiles.forEach(el => el.style.display = "none");
    allFolders.forEach(el => el.style.display = "none");

    for (const fileEl of allFiles) {
      if ((fileEl.dataset.path || "").includes(q)) {
        fileEl.style.display = "";
        let p = fileEl.parentElement;
        while (p) {
          if (p.tagName && p.tagName.toLowerCase() === "details") {
            p.style.display = "";
            p.open = true;
          }
          p = p.parentElement;
        }
      }
    }

    for (const folderEl of allFolders) {
      if ((folderEl.dataset.folder || "").includes(q)) {
        folderEl.style.display = "";
        folderEl.open = true;
        folderEl.querySelectorAll(".file").forEach(el => el.style.display = "");
        folderEl.querySelectorAll("details").forEach(el => { el.style.display = ""; el.open = true; });
      }
    }
  }

  // ── Main ─────────────────────────────────────────────────────────────────
  async function main() {
    // Share landing mode
    const fileParam = new URLSearchParams(location.search).get("file");
    if (fileParam) {
      showLanding(fileParam);
      return;
    }

    // Index mode — load files.json
    const treeEl = document.getElementById("tree");
    const statusEl = document.getElementById("status");
    const searchEl = document.getElementById("search");

    try {
      const res = await fetch("files.json");
      if (!res.ok) throw new Error(`files.json not found (${res.status}). Run generate-files.mjs first.`);
      const paths = await res.json();

      if (!Array.isArray(paths) || paths.length === 0) {
        treeEl.innerHTML = `<div class="muted">No playables found. Run generate-files.mjs to scan for .html files.</div>`;
        return;
      }

      treeEl.innerHTML = "";
      treeEl.appendChild(renderNode(buildNestedTree(paths), "", 0));
      statusEl.textContent = `${paths.length} playable(s)`;

      document.getElementById("expandAll").addEventListener("click", () => setAllDetails(true));
      document.getElementById("collapseAll").addEventListener("click", () => setAllDetails(false));
      searchEl.addEventListener("input", e => applySearch(e.target.value));

    } catch (err) {
      treeEl.innerHTML = `
        <div class="error">Failed to load playable list.</div>
        <div class="muted" style="margin-top:8px;">
          ${String(err.message || err)}<br><br>
          Make sure <code>files.json</code> exists — run <code>node generate-files.mjs</code> to generate it.
        </div>`;
    }
  }

  main();
})();
</script>

</body>
</html>
