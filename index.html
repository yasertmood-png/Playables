<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Playables</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0f1115;
      color:#e8e8e8;
      margin:0;
      padding:28px;
    }
    h1{margin:0 0 12px 0; font-size:22px;}

    .card{
      background:#151a22;
      border:1px solid #232a36;
      border-radius:10px;
      padding:14px;
      margin:12px 0;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      background:#1c2230;
      color:#fff;
      border:1px solid #2a3345;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{background:#242c3c;}

    input{
      background:#0f1115;
      color:#fff;
      border:1px solid #2a3345;
      padding:8px 12px;
      border-radius:8px;
      min-width:240px;
    }

    details{margin-left:10px;}
    summary{
      cursor:pointer;
      padding:6px 8px;
      border-radius:8px;
      font-weight:700;
      user-select:none;
    }
    summary:hover{background:#1c2230;}

    .file{
      margin:6px 0 6px 18px;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .file-name {
        display: inline-block;
        margin-right: 10px;
        font-weight: bold;
        max-width: 200px;
        text-overflow: ellipsis;
        white-space: nowrap;
        overflow: hidden;
    }

    .run{
      background:#2ecc71;
      border:none;
      padding:10px 16px;
      border-radius:8px;
      cursor:pointer;
      font-weight:800;
      color:#08110a;
    }
    .run:hover{background:#28b463;}

    .download{
      background:#3498db;
      border:none;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      font-weight:800;
      color:#07131d;
    }
    .download:hover{background:#2f86c1;}

    .share{
      background:#8e44ad;
      border:none;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      font-weight:800;
      color:#f0e8f5;
    }
    .share:hover{background:#7d3c98;}
    .share.copied{background:#27ae60;color:#fff;}

    .muted{opacity:.75;}
    .error{color:#ffb4b4;}

    /* Share landing page */
    #landing{display:none;}
    .landing-inner{
      max-width:420px;
      margin:80px auto 0;
      text-align:center;
    }
    .landing-inner h2{
      font-size:20px;
      margin:0 0 6px 0;
      word-break:break-all;
    }
    .landing-inner .sub{
      color:#7a8a9a;
      font-size:13px;
      margin-bottom:32px;
    }
    .landing-btns{
      display:flex;
      gap:16px;
      justify-content:center;
    }
    .landing-btns .run,
    .landing-btns .download{
      font-size:16px;
      padding:14px 28px;
    }
    .back-link{
      display:inline-block;
      margin-top:32px;
      color:#5a7fa8;
      text-decoration:none;
      font-size:13px;
    }
    .back-link:hover{color:#7fafd8;}
  </style>
</head>

<body>
  <!-- Normal index view -->
  <div id="index-view">
    <h1>🎮 Playables</h1>

    <div class="card">
      <div class="controls">
        <button id="expandAll" class="btn">Expand all</button>
        <button id="collapseAll" class="btn">Collapse all</button>
        <input id="search" placeholder="Search folders / files…" />
        <span id="status" class="muted"></span>
      </div>
    </div>

    <div id="tree" class="card">Loading repository files…</div>
  </div>

  <!-- Share landing page -->
  <div id="landing">
    <div class="landing-inner">
      <h2 id="landing-name"></h2>
      <div class="sub">Playable Ad</div>
      <div class="landing-btns">
        <button id="landing-download" class="download">⬇ Download</button>
        <button id="landing-run" class="run">▶ Run</button>
      </div>
      <a id="landing-back" href="" class="back-link">← All playables</a>
    </div>
  </div>

<script>
(() => {
  const EXCLUDE_BASENAMES = new Set(["README.md", "index.html"]);
  const ALLOWED_EXT = [".html"];

  function inferFromPagesURL() {
    const host = location.hostname;
    const parts = location.pathname.split("/").filter(Boolean);
    if (!host.endsWith(".github.io") || parts.length === 0) return null;
    const owner = host.slice(0, -".github.io".length);
    const repo = parts[0];
    return { owner, repo };
  }

  function pagesBaseFromInferred({ owner, repo }) {
    return `https://${owner}.github.io/${repo}/`;
  }

  function isAllowedPlayable(path) {
    const lower = path.toLowerCase();
    return ALLOWED_EXT.some(ext => lower.endsWith(ext));
  }

  async function getDefaultBranch(owner, repo) {
    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
      headers: { "Accept": "application/vnd.github+json" }
    });
    if (!res.ok) throw new Error(`Repo API error: ${res.status} ${res.statusText}`);
    return (await res.json()).default_branch || "main";
  }

  async function getRecursiveTree(owner, repo, branch) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/git/trees/${encodeURIComponent(branch)}?recursive=1`,
      { headers: { "Accept": "application/vnd.github+json" } }
    );
    if (!res.ok) throw new Error(`Tree API error: ${res.status} ${res.statusText}`);
    const data = await res.json();
    return Array.isArray(data.tree) ? data.tree : [];
  }

  function buildNestedTree(paths) {
    const root = { type: "dir", children: new Map() };
    for (const p of paths) {
      const segs = p.split("/").filter(Boolean);
      let cur = root;
      for (let i = 0; i < segs.length; i++) {
        const name = segs[i];
        const last = i === segs.length - 1;
        if (last) {
          cur.children.set(name, { type: "file", path: p });
        } else {
          if (!cur.children.has(name)) cur.children.set(name, { type: "dir", children: new Map() });
          cur = cur.children.get(name);
        }
      }
    }
    return root;
  }

  function sortChildren(map) {
    return [...map.entries()].sort((a, b) => {
      const A = a[1], B = b[1];
      if (A.type !== B.type) return A.type === "dir" ? -1 : 1;
      return a[0].localeCompare(b[0], undefined, { sensitivity: "base" });
    });
  }

  function makeShareURL(filePath) {
    return `${location.origin}${location.pathname}?file=${encodeURIComponent(filePath)}`;
  }

  function renderNode(node, name, depth, pagesBase) {
    if (node.type === "file") {
      const fileDiv = document.createElement("div");
      fileDiv.className = "file";
      fileDiv.dataset.path = node.path.toLowerCase();

      const fileUrl = pagesBase + node.path;
      const filename = node.path.split("/").pop() || "playable.html";

      const fileNameDiv = document.createElement("div");
      fileNameDiv.className = "file-name";
      fileNameDiv.textContent = filename;

      const downloadBtn = document.createElement("button");
      downloadBtn.className = "download";
      downloadBtn.textContent = "⬇ Download";
      downloadBtn.addEventListener("click", () => {
        const a = document.createElement("a");
        a.href = fileUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      });

      const shareBtn = document.createElement("button");
      shareBtn.className = "share";
      shareBtn.textContent = "🔗 Copy Link";
      shareBtn.addEventListener("click", () => {
        const shareUrl = makeShareURL(node.path);
        navigator.clipboard.writeText(shareUrl).then(() => {
          shareBtn.textContent = "✓ Copied!";
          shareBtn.classList.add("copied");
          setTimeout(() => {
            shareBtn.textContent = "🔗 Copy Link";
            shareBtn.classList.remove("copied");
          }, 2000);
        }).catch(() => {
          prompt("Copy this link:", shareUrl);
        });
      });

      const runBtn = document.createElement("button");
      runBtn.className = "run";
      runBtn.textContent = "▶ Run";
      runBtn.addEventListener("click", () => {
        window.open(fileUrl, "_blank", "noopener");
      });

      fileDiv.appendChild(fileNameDiv);
      fileDiv.appendChild(downloadBtn);
      fileDiv.appendChild(shareBtn);
      fileDiv.appendChild(runBtn);
      return fileDiv;
    }

    const details = document.createElement("details");
    details.dataset.folder = (name || "/").toLowerCase();
    if (depth === 0) details.open = true;

    const summary = document.createElement("summary");
    summary.textContent = name || "All Playables";
    details.appendChild(summary);

    const wrap = document.createElement("div");
    wrap.style.marginLeft = "10px";
    for (const [childName, childNode] of sortChildren(node.children)) {
      wrap.appendChild(renderNode(childNode, childName, depth + 1, pagesBase));
    }
    details.appendChild(wrap);
    return details;
  }

  function setAllDetails(open) {
    document.querySelectorAll("#tree details").forEach(d => d.open = open);
  }

  function applySearch(q) {
    q = q.trim().toLowerCase();
    const allFiles = [...document.querySelectorAll("#tree .file")];
    const allFolders = [...document.querySelectorAll("#tree details")];

    if (!q) {
      allFiles.forEach(el => el.style.display = "");
      allFolders.forEach(el => el.style.display = "");
      return;
    }

    allFiles.forEach(el => el.style.display = "none");
    allFolders.forEach(el => el.style.display = "none");

    for (const fileEl of allFiles) {
      if ((fileEl.dataset.path || "").includes(q)) {
        fileEl.style.display = "";
        let parent = fileEl.parentElement;
        while (parent) {
          if (parent.tagName && parent.tagName.toLowerCase() === "details") {
            parent.style.display = "";
            parent.open = true;
          }
          parent = parent.parentElement;
        }
      }
    }

    for (const folderEl of allFolders) {
      if ((folderEl.dataset.folder || "").includes(q)) {
        folderEl.style.display = "";
        folderEl.open = true;
        folderEl.querySelectorAll(".file").forEach(el => el.style.display = "");
        folderEl.querySelectorAll("details").forEach(el => { el.style.display = ""; el.open = true; });
      }
    }
  }

  function showLanding(filePath, pagesBase) {
    document.getElementById("index-view").style.display = "none";
    const landingEl = document.getElementById("landing");
    landingEl.style.display = "block";

    const fileUrl = pagesBase + filePath;
    const filename = filePath.split("/").pop() || "playable.html";

    document.title = filename;
    document.getElementById("landing-name").textContent = filename;

    document.getElementById("landing-download").addEventListener("click", () => {
      const a = document.createElement("a");
      a.href = fileUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    document.getElementById("landing-run").addEventListener("click", () => {
      window.open(fileUrl, "_blank", "noopener");
    });

    // Back link: index without ?file=
    document.getElementById("landing-back").href = `${location.origin}${location.pathname}`;
  }

  async function main() {
    const inferred = inferFromPagesURL();
    const treeEl = document.getElementById("tree");

    if (!inferred) {
      treeEl.innerHTML = `
        <div class="error">Open this page from your GitHub Pages site (USERNAME.github.io/REPO/).</div>
        <div class="muted" style="margin-top:8px;">If you opened it on github.com (code view), scripts may not run.</div>
      `;
      return;
    }

    const pagesBase = pagesBaseFromInferred(inferred);

    // If ?file= param present, show the share landing page
    const fileParam = new URLSearchParams(location.search).get("file");
    if (fileParam) {
      showLanding(fileParam, pagesBase);
      return;
    }

    // Normal index view
    const { owner, repo } = inferred;
    const statusEl = document.getElementById("status");
    const searchEl = document.getElementById("search");

    try {
      statusEl.textContent = "Loading…";
      const branch = await getDefaultBranch(owner, repo);
      const items = await getRecursiveTree(owner, repo, branch);

      const playablePaths = items
        .filter(x => x.type === "blob" && typeof x.path === "string")
        .map(x => x.path)
        .filter(p => !EXCLUDE_BASENAMES.has(p.split("/").pop()))
        .filter(p => isAllowedPlayable(p));

      if (playablePaths.length === 0) {
        statusEl.textContent = "";
        treeEl.innerHTML = `<div class="muted">No playables found. Upload .html files (or folders containing them).</div>`;
        return;
      }

      const nested = buildNestedTree(playablePaths);
      treeEl.innerHTML = "";
      treeEl.appendChild(renderNode(nested, "", 0, pagesBase));
      statusEl.textContent = `${playablePaths.length} playable(s)`;

      document.getElementById("expandAll").addEventListener("click", () => setAllDetails(true));
      document.getElementById("collapseAll").addEventListener("click", () => setAllDetails(false));
      searchEl.addEventListener("input", (e) => applySearch(e.target.value));

    } catch (err) {
      statusEl.textContent = "";
      treeEl.innerHTML = `
        <div class="error">Failed to load file list.</div>
        <div class="muted" style="margin-top:8px;">
          ${String(err.message || err)}
          <br><br>
          Common causes:
          <ul>
            <li>Repo is private (GitHub API won't list files without auth).</li>
            <li>GitHub API rate limit (try again later).</li>
          </ul>
        </div>
      `;
    }
  }

  main();
})();
</script>

</body>
</html>
